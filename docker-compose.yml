version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: x3crm-db
    environment:
      POSTGRES_USER: x3crm
      POSTGRES_PASSWORD: x3crm123
      POSTGRES_DB: x3crm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U x3crm']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: x3crm-backend
    environment:
      DATABASE_URL: postgresql://x3crm:x3crm123@postgres:5432/x3crm
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      FRONTEND_URL: http://localhost:3000
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: x3crm-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
